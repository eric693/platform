<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ERIC TECH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f0eb;--surface:#faf9f6;--border:#e0ddd6;--border-d:#ccc9c0;
  --acc:#2d6a4f;--acc-h:#1e4d39;--acc-dim:rgba(45,106,79,.09);--acc-border:rgba(45,106,79,.25);
  --txt:#1a1f1b;--txt2:#6b7068;--success:#2d6a4f;--warn:#b7791f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans TC','Inter',sans-serif;min-height:100vh}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Inter',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;color:var(--txt);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.logo-dot{width:6px;height:6px;background:var(--acc);border-radius:50%;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:8px}

/* LANG SWITCHER */
.lang-switcher{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border-d);border-radius:7px;overflow:hidden}
.lang-btn{font-family:'Inter',sans-serif;font-size:.68rem;font-weight:500;padding:6px 12px;background:transparent;border:none;color:var(--txt2);cursor:pointer;transition:all .15s;letter-spacing:.02em}
.lang-btn.active{background:var(--acc);color:#fff}
.lang-btn:hover:not(.active){color:var(--txt)}

.btn-admin{font-family:'Inter',sans-serif;font-size:.7rem;color:var(--txt2);border:1px solid var(--border-d);background:transparent;padding:7px 16px;border-radius:7px;cursor:pointer;letter-spacing:.03em;transition:all .18s}
.btn-admin:hover{border-color:var(--acc);color:var(--acc)}

/* PAGE HEADER */
.page-header{background:var(--surface);border-bottom:1px solid var(--border)}
.page-header-inner{max-width:1200px;margin:0 auto;padding:32px 40px 26px}
.page-title{font-family:'Inter',sans-serif;font-weight:700;font-size:1.6rem;color:var(--txt);letter-spacing:-.02em}
.page-sub{margin-top:5px;font-size:.85rem;color:var(--txt2);font-weight:400}

/* FILTER */
.filter-wrap{background:var(--surface);border-bottom:1px solid var(--border)}
.filter-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center}
.ftab{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.03em;padding:13px 18px;background:transparent;border:none;color:var(--txt2);cursor:pointer;transition:color .18s;position:relative;white-space:nowrap}
.ftab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--acc);transform:scaleX(0);transition:transform .22s}
.ftab.active{color:var(--acc)}
.ftab.active::after{transform:scaleX(1)}
.ftab:hover{color:var(--txt)}
.ftab-count{font-size:.6rem;background:var(--acc-dim);border:1px solid var(--acc-border);color:var(--acc);padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}

/* GRID */
.grid-wrap{max-width:1200px;margin:0 auto;padding:24px 40px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* LOADING */
.loading{grid-column:1/-1;padding:60px 20px;text-align:center;font-size:.82rem;color:var(--txt2)}
.spinner{width:24px;height:24px;border:2px solid var(--border-d);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .22s,transform .22s,border-color .22s}
.card:hover{border-color:var(--acc-border);box-shadow:0 8px 32px rgba(45,106,79,.1);transform:translateY(-2px)}
.card-img{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:var(--bg)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.card:hover .card-img img{transform:scale(1.03)}
.card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8e8e0 0%,#ddddd4 100%)}
.card-initials{font-family:'Inter',sans-serif;font-weight:800;font-size:2.8rem;color:rgba(45,106,79,.15);letter-spacing:-.06em;text-transform:uppercase;user-select:none}
.card-lock-badge{position:absolute;top:10px;right:10px;background:rgba(183,121,31,.1);border:1px solid rgba(183,121,31,.3);color:var(--warn);font-family:'Inter',sans-serif;font-size:.58rem;font-weight:600;padding:3px 9px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase}
.card-body{padding:18px 20px 20px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.badge{font-family:'Inter',sans-serif;font-size:.58rem;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:.05em;text-transform:uppercase;display:inline-block}
.badge-product{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-border)}
.badge-course{background:rgba(45,106,79,.08);color:var(--success);border:1px solid rgba(45,106,79,.22)}
.card-idx{font-family:'Inter',sans-serif;font-size:.6rem;color:var(--border-d);font-weight:500}
.card-title{font-family:'Inter',sans-serif;font-weight:600;font-size:1.05rem;color:var(--txt);line-height:1.3;margin-bottom:7px;letter-spacing:-.01em}
.card-desc{font-size:.82rem;color:var(--txt2);line-height:1.7;margin-bottom:15px;font-weight:400}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:13px;border-top:1px solid var(--border)}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-family:'Inter',sans-serif;font-size:.58rem;color:var(--txt2);border:1px solid var(--border-d);padding:2px 7px;border-radius:4px;letter-spacing:.03em}
.card-cta{font-family:'Inter',sans-serif;font-size:.68rem;font-weight:500;color:var(--txt2);transition:all .2s;white-space:nowrap;flex-shrink:0}
.card:hover .card-cta{color:var(--acc);transform:translateX(3px)}
.empty{grid-column:1/-1;padding:80px 20px;text-align:center;font-size:.82rem;color:var(--txt2)}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,12,.45);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* PW MODAL */
.pw-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;overflow:hidden;animation:fadeUp .2s ease;position:relative;box-shadow:0 20px 60px rgba(10,20,12,.12)}
.pw-modal-head{padding:24px 26px 20px;border-bottom:1px solid var(--border)}
.pw-eyebrow{font-family:'Inter',sans-serif;font-size:.6rem;font-weight:600;color:var(--acc);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.pw-title{font-family:'Inter',sans-serif;font-weight:700;font-size:1.1rem;color:var(--txt)}
.pw-modal-body{padding:22px 26px 26px}
.pw-sub{font-size:.83rem;color:var(--txt2);line-height:1.7;margin-bottom:16px}
.pw-input{width:100%;background:var(--bg);border:1px solid var(--border-d);border-radius:8px;padding:12px 14px;color:var(--txt);font-family:'Inter',monospace;font-size:.95rem;letter-spacing:.1em;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:8px}
.pw-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
.pw-input.err{border-color:#c0392b;box-shadow:0 0 0 3px rgba(192,57,43,.08)}
.pw-err{font-size:.68rem;color:#c0392b;margin-bottom:12px;display:none}
.pw-submit{width:100%;background:var(--acc);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Inter',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:background .18s}
.pw-submit:hover{background:var(--acc-h)}
.pw-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border);color:var(--txt2);font-family:'Inter',sans-serif;font-size:.62rem;cursor:pointer;padding:5px 10px;border-radius:5px;transition:all .18s}
.pw-close:hover{border-color:var(--border-d);color:var(--txt)}

@media(max-width:760px){
  .nav-inner,.page-header-inner,.filter-inner,.grid-wrap{padding-left:18px;padding-right:18px}
  .grid{grid-template-columns:1fr}
  .nav-right{gap:6px}
  .btn-admin{padding:6px 12px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo">ERIC TECH <span class="logo-dot"></span></div>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('zh',this)">中文</button>
        <button class="lang-btn" onclick="setLang('en',this)">EN</button>
      </div>
      <button class="btn-admin" onclick="location.href='admin.html'" data-i18n="nav_admin">Admin</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-title" data-i18n="page_title">Products &amp; Courses</div>
    <div class="page-sub" data-i18n="page_sub">點選卡片即可前往，部分內容需要密碼驗證解鎖。</div>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-inner">
    <button class="ftab active" onclick="doFilter('all',this)" data-i18n="tab_all">All <span class="ftab-count" id="cA">0</span></button>
    <button class="ftab" onclick="doFilter('product',this)" data-i18n="tab_products">Products <span class="ftab-count" id="cP">0</span></button>
    <button class="ftab" onclick="doFilter('course',this)" data-i18n="tab_courses">Courses <span class="ftab-count" id="cC">0</span></button>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<div class="overlay" id="pwOv">
  <div class="pw-modal">
    <button class="pw-close" onclick="closePw()" data-i18n="btn_close">Close</button>
    <div class="pw-modal-head">
      <div class="pw-eyebrow" data-i18n="pw_eyebrow">Access Required</div>
      <div class="pw-title" id="pwT">Protected Content</div>
    </div>
    <div class="pw-modal-body">
      <p class="pw-sub" id="pwS"></p>
      <input class="pw-input" type="password" id="pwI" onkeydown="if(event.key==='Enter')go()"/>
      <div class="pw-err" id="pwE" data-i18n="pw_error">密碼錯誤，請重新輸入</div>
      <button class="pw-submit" onclick="go()" data-i18n="pw_submit">Unlock &amp; Continue</button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ──
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const USE_SUPABASE = SUPABASE_URL !== 'YOUR_SUPABASE_URL';

// ── I18N ──
const i18n = {
  zh: {
    nav_admin: 'Admin',
    page_title: '產品 &amp; 課程',
    page_sub: '點選卡片即可前往，部分內容需要密碼驗證解鎖。',
    tab_all: '全部',
    tab_products: '產品',
    tab_courses: '課程',
    btn_close: '關閉',
    pw_eyebrow: '存取驗證',
    pw_error: '密碼錯誤，請重新輸入',
    pw_submit: '解鎖並前往',
    pw_placeholder: '請輸入密碼',
    pw_sub_product: '此產品受密碼保護，請輸入專屬密碼以繼續前往。',
    pw_sub_course:  '此課程受密碼保護，請輸入專屬密碼以繼續前往。',
    badge_product: 'Product',
    badge_course: 'Course',
    badge_locked: '已鎖定',
    card_cta: '前往 →',
    empty: '目前沒有內容，請稍後再試。',
    loading: '載入中...',
  },
  en: {
    nav_admin: 'Admin',
    page_title: 'Products &amp; Courses',
    page_sub: 'Click any card to visit. Some content requires a password to unlock.',
    tab_all: 'All',
    tab_products: 'Products',
    tab_courses: 'Courses',
    btn_close: 'Close',
    pw_eyebrow: 'Access Required',
    pw_error: 'Incorrect password. Please try again.',
    pw_submit: 'Unlock &amp; Continue',
    pw_placeholder: 'Enter password',
    pw_sub_product: 'This product is password protected. Enter the access password to continue.',
    pw_sub_course:  'This course is password protected. Enter the access password to continue.',
    badge_product: 'Product',
    badge_course: 'Course',
    badge_locked: 'Locked',
    card_cta: 'View →',
    empty: 'No entries found. Please check back later.',
    loading: 'Loading...',
  }
};

let lang = localStorage.getItem('et_lang') || 'zh';

function setLang(l, btn) {
  lang = l;
  localStorage.setItem('et_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.lang = l === 'zh' ? 'zh-TW' : 'en';
  applyI18n();
  render();
}

function t(key) { return i18n[lang][key] || i18n['en'][key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    // preserve count spans inside tabs
    const countSpan = el.querySelector('.ftab-count');
    if (countSpan) {
      el.innerHTML = val + ' ' + countSpan.outerHTML;
    } else {
      el.innerHTML = val;
    }
  });
  const pwI = document.getElementById('pwI');
  if (pwI) pwI.placeholder = t('pw_placeholder');
}

// ── DATA ──
const CARDS_KEY = 'et_cards';
const DEFAULT_CARDS = [
  {id:1,title:'座位預訂系統',type:'product',url:'https://seat-booking-rlf2.onrender.com',img:'',description:'即時座位管理與線上預訂平台，支援多場地配置與即時同步。',tags:['Node.js','Express','WebSocket'],password:'demo123'},
  {id:2,title:'Aura App',type:'product',url:'https://aura-v0q3.onrender.com',img:'',description:'智慧氛圍感知應用，打造沉浸式互動體驗。',tags:['React','AI','UX'],password:''},
  {id:3,title:'Prompt 工程課程',type:'course',url:'https://eric693.github.io/prompt_course/',img:'',description:'從零開始學習 AI Prompt 工程，掌握 ChatGPT 與 Claude 的核心技巧。',tags:['AI','ChatGPT','Claude'],password:'course2024'}
];

let cards = [], cur = 'all', pending = null;

// ── SUPABASE ──
async function loadFromSupabase() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/entries?select=*&order=created_at.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error('Supabase fetch failed');
  const data = await res.json();
  return data.map(r => ({
    id: r.id, title: r.title, type: r.type, url: r.url,
    img: r.img || '', description: r.description || '',
    tags: r.tags || [], password: r.password || ''
  }));
}

async function initData() {
  if (USE_SUPABASE) {
    try {
      cards = await loadFromSupabase();
    } catch(e) {
      console.warn('Supabase failed, using localStorage', e);
      cards = JSON.parse(localStorage.getItem(CARDS_KEY) || 'null') || DEFAULT_CARDS;
    }
  } else {
    cards = JSON.parse(localStorage.getItem(CARDS_KEY) || 'null') || DEFAULT_CARDS;
  }
  render();
}

// ── RENDER ──
function initials(t) { return t.split(/[\s\-_]+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,3); }

function updateCounts() {
  const p  = cards.filter(c => c.type === 'product').length;
  const co = cards.filter(c => c.type === 'course').length;
  document.getElementById('cA').textContent = cards.length;
  document.getElementById('cP').textContent = p;
  document.getElementById('cC').textContent = co;
}

function render() {
  updateCounts();
  const list = cur === 'all' ? cards : cards.filter(c => c.type === cur);
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div class="empty">${t('empty')}</div>`;
    return;
  }
  g.innerHTML = list.map((c, i) => `
    <div class="card" onclick="clickCard(${c.id})">
      <div class="card-img">
        ${c.img ? `<img src="${c.img}" alt="${c.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="card-placeholder" style="${c.img ? 'display:none' : ''}">
          <div class="card-initials">${initials(c.title)}</div>
        </div>
        ${c.password ? `<div class="card-lock-badge">${t('badge_locked')}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="badge badge-${c.type}">${c.type === 'course' ? t('badge_course') : t('badge_product')}</span>
          <span class="card-idx">${String(i+1).padStart(2,'0')}</span>
        </div>
        <div class="card-title">${c.title}</div>
        ${c.description ? `<div class="card-desc">${c.description}</div>` : ''}
        <div class="card-foot">
          <div class="tags">${(c.tags||[]).map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
          <span class="card-cta">${t('card_cta')}</span>
        </div>
      </div>
    </div>`).join('');
}

function doFilter(type, btn) {
  cur = type;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function clickCard(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  if (c.password) {
    pending = c;
    document.getElementById('pwT').textContent = c.title;
    document.getElementById('pwS').textContent = c.type === 'course' ? t('pw_sub_course') : t('pw_sub_product');
    document.getElementById('pwI').value = '';
    document.getElementById('pwI').classList.remove('err');
    document.getElementById('pwE').style.display = 'none';
    document.getElementById('pwOv').classList.add('show');
    setTimeout(() => document.getElementById('pwI').focus(), 80);
  } else {
    window.open(c.url, '_blank');
  }
}

function closePw() { document.getElementById('pwOv').classList.remove('show'); pending = null; }
function go() {
  const v = document.getElementById('pwI').value;
  if (v === pending?.password) {
    closePw(); window.open(pending.url, '_blank');
  } else {
    document.getElementById('pwI').classList.add('err');
    document.getElementById('pwE').style.display = 'block';
    document.getElementById('pwI').focus();
    document.getElementById('pwI').select();
  }
}

document.getElementById('pwOv').addEventListener('click', e => { if (e.target.id === 'pwOv') closePw(); });

// sync localStorage changes from admin (non-supabase)
window.addEventListener('storage', e => {
  if (!USE_SUPABASE && e.key === CARDS_KEY) {
    cards = JSON.parse(localStorage.getItem(CARDS_KEY) || 'null') || DEFAULT_CARDS;
    render();
  }
});

// init lang from saved preference
(function() {
  const saved = localStorage.getItem('et_lang') || 'zh';
  lang = saved;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (saved === 'zh' ? '中文' : 'EN'));
  });
  document.documentElement.lang = saved === 'zh' ? 'zh-TW' : 'en';
})();

applyI18n();
initData();
</script>
</body>
</html>
