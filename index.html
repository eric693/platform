<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERIC TECH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f0eb;
      --surface: #faf9f6;
      --border: #e0ddd6;
      --border-d: #ccc9c0;
      --acc: #2d6a4f;
      --acc-h: #1e4d39;
      --acc-dim: rgba(45,106,79,.09);
      --acc-border: rgba(45,106,79,.25);
      --txt: #1a1f1b;
      --txt2: #6b7068;
      --success: #2d6a4f;
      --warn: #b7791f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--txt); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

    /* NAV */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Inter', sans-serif; font-weight: 700; font-size: .95rem; letter-spacing: .06em; color: var(--txt); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 6px; height: 6px; background: var(--acc); border-radius: 50%; flex-shrink: 0; }
    .btn-admin { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--txt2); border: 1px solid var(--border-d); background: transparent; padding: 8px 18px; border-radius: 6px; cursor: pointer; letter-spacing: .08em; text-transform: uppercase; transition: all .18s; }
    .btn-admin:hover { border-color: var(--acc); color: var(--acc); }

    /* PAGE HEADER */
    .page-header { background: var(--surface); border-bottom: 1px solid var(--border); }
    .page-header-inner { max-width: 1200px; margin: 0 auto; padding: 36px 40px 28px; }
    .page-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.7rem; color: var(--txt); letter-spacing: -.02em; }
    .page-sub { margin-top: 6px; font-size: .85rem; color: var(--txt2); font-weight: 300; }

    /* FILTER */
    .filter-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
    .filter-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; }
    .ftab { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .08em; text-transform: uppercase; padding: 14px 20px; background: transparent; border: none; color: var(--txt2); cursor: pointer; transition: color .18s; position: relative; white-space: nowrap; }
    .ftab::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--acc); transform: scaleX(0); transition: transform .22s; }
    .ftab.active { color: var(--acc); }
    .ftab.active::after { transform: scaleX(1); }
    .ftab:hover { color: var(--txt); }
    .ftab-count { font-size: .55rem; background: var(--acc-dim); border: 1px solid var(--acc-border); color: var(--acc); padding: 1px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

    /* GRID */
    .grid-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 40px 80px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: box-shadow .22s, transform .22s, border-color .22s; }
    .card:hover { border-color: var(--acc-border); box-shadow: 0 8px 32px rgba(45,106,79,.1); transform: translateY(-2px); }

    .card-img { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; background: var(--bg); }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
    .card:hover .card-img img { transform: scale(1.03); }
    .card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e8e8e0 0%, #ddddd4 100%); }
    .card-initials { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 2.8rem; color: rgba(45,106,79,.15); letter-spacing: -.06em; text-transform: uppercase; user-select: none; }
    .card-lock-badge { position: absolute; top: 10px; right: 10px; background: rgba(217,119,6,.1); border: 1px solid rgba(217,119,6,.3); color: var(--warn); font-family: 'DM Mono', monospace; font-size: .56rem; padding: 3px 8px; border-radius: 4px; letter-spacing: .1em; text-transform: uppercase; }

    .card-body { padding: 20px 22px 22px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .badge { font-family: 'DM Mono', monospace; font-size: .56rem; padding: 3px 8px; border-radius: 4px; letter-spacing: .08em; text-transform: uppercase; display: inline-block; }
    .badge-product { background: var(--acc-dim); color: var(--acc); border: 1px solid var(--acc-border); }
    .badge-course  { background: rgba(45,106,79,.08); color: var(--success); border: 1px solid rgba(45,106,79,.22); }
    .card-idx { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--border-d); }
    .card-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--txt); line-height: 1.3; margin-bottom: 8px; letter-spacing: -.01em; }
    .card-desc { font-size: .82rem; color: var(--txt2); line-height: 1.7; margin-bottom: 16px; font-weight: 300; }
    .card-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--border); }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { font-family: 'DM Mono', monospace; font-size: .54rem; color: var(--txt2); border: 1px solid var(--border-d); padding: 2px 7px; border-radius: 4px; letter-spacing: .05em; text-transform: uppercase; }
    .card-cta { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--txt2); transition: all .2s; white-space: nowrap; flex-shrink: 0; }
    .card:hover .card-cta { color: var(--acc); transform: translateX(3px); }

    /* EMPTY */
    .empty { grid-column: 1/-1; padding: 80px 20px; text-align: center; font-family: 'DM Mono', monospace; font-size: .75rem; color: var(--txt2); letter-spacing: .08em; }

    /* OVERLAY */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,.45); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .overlay.show { display: flex; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* PASSWORD MODAL */
    .pw-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 420px; overflow: hidden; animation: fadeUp .2s ease; position: relative; box-shadow: 0 20px 60px rgba(26,26,46,.15); }
    .pw-modal-head { padding: 26px 28px 22px; border-bottom: 1px solid var(--border); }
    .pw-eyebrow { font-family: 'DM Mono', monospace; font-size: .56rem; color: var(--acc); letter-spacing: .16em; text-transform: uppercase; margin-bottom: 8px; }
    .pw-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--txt); }
    .pw-modal-body { padding: 24px 28px 28px; }
    .pw-sub { font-size: .83rem; color: var(--txt2); line-height: 1.7; margin-bottom: 18px; font-weight: 300; }
    .pw-input { width: 100%; background: var(--bg); border: 1px solid var(--border-d); border-radius: 8px; padding: 12px 14px; color: var(--txt); font-family: 'DM Mono', monospace; font-size: .95rem; letter-spacing: .12em; outline: none; transition: border-color .2s, box-shadow .2s; margin-bottom: 8px; }
    .pw-input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-dim); }
    .pw-input.err { border-color: #e84343; box-shadow: 0 0 0 3px rgba(232,67,67,.08); }
    .pw-err { font-family: 'DM Mono', monospace; font-size: .6rem; color: #e84343; letter-spacing: .06em; margin-bottom: 12px; display: none; }
    .pw-submit { width: 100%; background: var(--acc); color: #fff; border: none; border-radius: 8px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: .85rem; cursor: pointer; letter-spacing: .05em; transition: background .18s; }
    .pw-submit:hover { background: var(--acc-h); }
    .pw-close { position: absolute; top: 16px; right: 16px; background: transparent; border: 1px solid var(--border); color: var(--txt2); font-family: 'DM Mono', monospace; font-size: .56rem; cursor: pointer; padding: 5px 10px; border-radius: 5px; letter-spacing: .06em; text-transform: uppercase; transition: all .18s; }
    .pw-close:hover { border-color: var(--border-d); color: var(--txt); }

    @media (max-width: 760px) {
      .nav-inner, .page-header-inner, .filter-inner, .grid-wrap { padding-left: 18px; padding-right: 18px; }
      .page-header-inner { flex-direction: column; align-items: flex-start; }
      .stats-row { gap: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="logo">ERIC TECH <span class="logo-dot"></span></div>
    <button class="btn-admin" onclick="location.href='admin.html'">Admin</button>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="page-title">Products &amp; Courses</div>
    <div class="page-sub">點選卡片即可前往，部分內容需要密碼驗證解鎖。</div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-wrap">
  <div class="filter-inner">
    <button class="ftab active" onclick="doFilter('all',this)">All <span class="ftab-count" id="cA">0</span></button>
    <button class="ftab" onclick="doFilter('product',this)">Products <span class="ftab-count" id="cP">0</span></button>
    <button class="ftab" onclick="doFilter('course',this)">Courses <span class="ftab-count" id="cC">0</span></button>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- PASSWORD MODAL -->
<div class="overlay" id="pwOv">
  <div class="pw-modal">
    <button class="pw-close" onclick="closePw()">Close</button>
    <div class="pw-modal-head">
      <div class="pw-eyebrow">Access Required</div>
      <div class="pw-title" id="pwT">Protected Content</div>
    </div>
    <div class="pw-modal-body">
      <p class="pw-sub" id="pwS">此內容受密碼保護，請輸入專屬密碼以繼續前往。</p>
      <input class="pw-input" type="password" id="pwI" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') go()" />
      <div class="pw-err" id="pwE">密碼錯誤，請重新輸入</div>
      <button class="pw-submit" onclick="go()">Unlock &amp; Continue</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT = [
    { id:1, title:'座位預訂系統',   type:'product', url:'https://seat-booking-rlf2.onrender.com',    img:'', desc:'即時座位管理與線上預訂平台，支援多場地配置與即時同步。', tags:['Node.js','Express','WebSocket'], pw:'demo123'    },
    { id:2, title:'Aura App',       type:'product', url:'https://aura-v0q3.onrender.com',             img:'', desc:'智慧氛圍感知應用，打造沉浸式互動體驗。',                 tags:['React','AI','UX'],               pw:''           },
    { id:3, title:'Prompt 工程課程', type:'course',  url:'https://eric693.github.io/prompt_course/',   img:'', desc:'從零開始學習 AI Prompt 工程，掌握 ChatGPT 與 Claude 的核心技巧。', tags:['AI','ChatGPT','Claude'], pw:'course2024' }
  ];

  let cards   = JSON.parse(localStorage.getItem('et_cards') || 'null') || DEFAULT;
  let cur     = 'all';
  let pending = null;

  function initials(t) { return t.split(/[\s\-_]+/).map(w => w[0]||'').join('').toUpperCase().slice(0,3); }

  function updateCounts() {
    const p  = cards.filter(c => c.type === 'product').length;
    const co = cards.filter(c => c.type === 'course').length;
    document.getElementById('cA').textContent = cards.length;
    document.getElementById('cP').textContent = p;
    document.getElementById('cC').textContent = co;
  }

  function render() {
    updateCounts();
    const list = cur === 'all' ? cards : cards.filter(c => c.type === cur);
    const g = document.getElementById('grid');
    if (!list.length) {
      g.innerHTML = '<div class="empty">No entries found. Please check back later.</div>';
      return;
    }
    g.innerHTML = list.map((c, i) => `
      <div class="card" onclick="clickCard(${c.id})">
        <div class="card-img">
          ${c.img ? `<img src="${c.img}" alt="${c.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="card-placeholder" style="${c.img ? 'display:none' : ''}">
            <div class="card-initials">${initials(c.title)}</div>
          </div>
          ${c.pw ? '<div class="card-lock-badge">Locked</div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="badge badge-${c.type}">${c.type === 'course' ? 'Course' : 'Product'}</span>
            <span class="card-idx">${String(i+1).padStart(2,'0')}</span>
          </div>
          <div class="card-title">${c.title}</div>
          ${c.desc ? `<div class="card-desc">${c.desc}</div>` : ''}
          <div class="card-foot">
            <div class="tags">${(c.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <span class="card-cta">前往 &rarr;</span>
          </div>
        </div>
      </div>`).join('');
  }

  function doFilter(type, btn) {
    cur = type;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clickCard(id) {
    const c = cards.find(x => x.id === id);
    if (!c) return;
    if (c.pw) {
      pending = c;
      document.getElementById('pwT').textContent = c.title;
      document.getElementById('pwS').textContent = `此${c.type === 'course' ? '課程' : '產品'}受密碼保護，請輸入專屬密碼以繼續前往。`;
      document.getElementById('pwI').value = '';
      document.getElementById('pwI').classList.remove('err');
      document.getElementById('pwE').style.display = 'none';
      document.getElementById('pwOv').classList.add('show');
      setTimeout(() => document.getElementById('pwI').focus(), 80);
    } else {
      window.open(c.url, '_blank');
    }
  }

  function closePw() { document.getElementById('pwOv').classList.remove('show'); pending = null; }

  function go() {
    const v = document.getElementById('pwI').value;
    if (v === pending?.pw) {
      closePw(); window.open(pending.url, '_blank');
    } else {
      document.getElementById('pwI').classList.add('err');
      document.getElementById('pwE').style.display = 'block';
      document.getElementById('pwI').focus();
      document.getElementById('pwI').select();
    }
  }

  document.getElementById('pwOv').addEventListener('click', e => { if (e.target.id === 'pwOv') closePw(); });
  window.addEventListener('storage', e => {
    if (e.key === 'et_cards') { cards = JSON.parse(localStorage.getItem('et_cards') || 'null') || DEFAULT; render(); }
  });

  render();
</script>
</body>
</html>
